services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fabricator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-fabricator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fabricator} -d ${POSTGRES_DB:-fabricator}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-fabricator}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fabricator}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-7}
      TRAINER_EMAIL: ${TRAINER_EMAIL:?Set TRAINER_EMAIL in .env}
      TRAINER_PASSWORD: ${TRAINER_PASSWORD:?Set TRAINER_PASSWORD in .env}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
